version: "3.9"

services:
  app:
    build: .
    image: ppe-monitor:latest
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      PPE_DB_PATH: /app/data/violations.db
      PPE_MODEL_PATH: /app/data/best.pt
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped

  api:
    build: .
    image: ppe-monitor:latest
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      PPE_DB_PATH: /app/data/violations.db
      PPE_API_HOST: "0.0.0.0"
      PPE_API_PORT: "8000"
    command: python -m src.api.server
    depends_on:
      - app
    restart: unless-stopped

volumes:
  data:
