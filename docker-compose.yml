version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: ppe_postgres
    environment:
      POSTGRES_USER:     ppe_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ppe_pass}
      POSTGRES_DB:       ppe_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppe_user -d ppe_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    image: ppe-monitor:latest
    container_name: ppe_api
    ports:
      - "8000:8000"
    environment:
      PPE_DATABASE_URL: postgresql://ppe_user:${POSTGRES_PASSWORD:-ppe_pass}@postgres:5432/ppe_db
      PPE_API_HOST:     "0.0.0.0"
      PPE_API_PORT:     "8000"
      PPE_LOG_LEVEL:    ${LOG_LEVEL:-INFO}
    command: python -m src.api.server
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  app:
    build: .
    image: ppe-monitor:latest
    container_name: ppe_app
    ports:
      - "8501:8501"
    volumes:
      - model_data:/app/data
    environment:
      PPE_DATABASE_URL: postgresql://ppe_user:${POSTGRES_PASSWORD:-ppe_pass}@postgres:5432/ppe_db
      PPE_LOG_LEVEL:    ${LOG_LEVEL:-INFO}
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ppe_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: ppe_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  model_data:
  prometheus_data:
  grafana_data:
